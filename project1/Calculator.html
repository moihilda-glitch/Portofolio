<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calculatorr.css">
</head>
<body>

  <div class="calc-shell">

    <div class="calc-header">
      <p class="calc-label">Kalkulator</p>
      <div class="calc-expression" id="expr">&nbsp;</div>
      <div class="calc-display" id="display">0</div>
    </div>

    <div class="calc-grid">
      <button class="btn fn danger" onclick="clearAll()">AC</button>
      <button class="btn fn"        onclick="toggleSign()">±</button>
      <button class="btn fn"        onclick="inputPercent()">%</button>
      <button class="btn op"        onclick="inputOp('/')">÷</button>

      <button class="btn" onclick="inputNum('7')">7</button>
      <button class="btn" onclick="inputNum('8')">8</button>
      <button class="btn" onclick="inputNum('9')">9</button>
      <button class="btn op" onclick="inputOp('*')">×</button>

      <button class="btn" onclick="inputNum('4')">4</button>
      <button class="btn" onclick="inputNum('5')">5</button>
      <button class="btn" onclick="inputNum('6')">6</button>
      <button class="btn op" onclick="inputOp('-')">−</button>

      <button class="btn" onclick="inputNum('1')">1</button>
      <button class="btn" onclick="inputNum('2')">2</button>
      <button class="btn" onclick="inputNum('3')">3</button>
      <button class="btn op" onclick="inputOp('+')">+</button>

      <button class="btn zero" onclick="inputNum('0')">0</button>
      <button class="btn"      onclick="inputDot()">.</button>
      <button class="btn eq"   onclick="calculate()">=</button>
    </div>

    <div class="history-bar">
      <div class="history-line" id="history">&nbsp;</div>
    </div>

  </div>

  <script src="calculator.js"></script>
</body>
</html>
